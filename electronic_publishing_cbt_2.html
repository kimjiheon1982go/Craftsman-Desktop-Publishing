<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전자출판기능사 CBT 모의고사 2회</title>
<style>
  :root{
    --bg:#0f172a; --card:#1e293b; --accent:#38bdf8; --good:#22c55e; --bad:#ef4444; --text:#e2e8f0; --muted:#94a3b8;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:'Malgun Gothic',Apple SD Gothic Neo,sans-serif;
    background:var(--bg); color:var(--text); min-height:100vh;
  }
  .wrap{max-width:760px; margin:0 auto; padding:20px;}
  header{display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;}
  h1{font-size:1.3rem; margin:0;}
  .timer{font-size:1.1rem; font-weight:bold; color:var(--accent); background:var(--card); padding:6px 14px; border-radius:8px;}
  .progress{height:8px; background:var(--card); border-radius:4px; overflow:hidden; margin-bottom:16px;}
  .progress-bar{height:100%; background:var(--accent); width:0%; transition:width .2s;}
  .card{background:var(--card); border-radius:12px; padding:20px; margin-bottom:14px;}
  .qnum{color:var(--accent); font-weight:bold; margin-bottom:8px;}
  .qtext{font-size:1.05rem; margin-bottom:14px; line-height:1.5;}
  .options label{
    display:block; padding:12px 14px; margin-bottom:8px; border-radius:8px;
    background:#0f172a; cursor:pointer; border:1px solid #334155; transition:.15s;
  }
  .options label:hover{border-color:var(--accent);}
  .options input{margin-right:10px;}
  .options label.selected{border-color:var(--accent); background:#0c4a6e;}
  .nav-grid{display:grid; grid-template-columns:repeat(10,1fr); gap:6px; margin-bottom:16px;}
  .nav-grid button{
    aspect-ratio:1; border:1px solid #334155; background:#0f172a; color:var(--text);
    border-radius:6px; cursor:pointer; font-size:.8rem;
  }
  .nav-grid button.answered{background:#0c4a6e; border-color:var(--accent);}
  .nav-grid button.current{outline:2px solid var(--accent);}
  .controls{display:flex; gap:10px; justify-content:space-between; margin-top:10px;}
  .btn{
    padding:12px 20px; border:none; border-radius:8px; font-size:1rem; cursor:pointer;
    background:var(--accent); color:#0f172a; font-weight:bold; flex:1;
  }
  .btn.secondary{background:#334155; color:var(--text);}
  .btn.submit{background:var(--bad); color:white;}
  .btn:active{transform:scale(.98);}
  .hidden{display:none;}
  .result-summary{text-align:center; padding:20px;}
  .result-score{font-size:2.5rem; font-weight:bold; color:var(--accent);}
  .review-card{border-left:4px solid var(--bad);}
  .review-card.correct{border-left:4px solid var(--good);}
  .review-opt{padding:8px 12px; border-radius:6px; margin-bottom:6px; background:#0f172a;}
  .review-opt.correct-answer{background:#14532d; border:1px solid var(--good);}
  .review-opt.wrong-selected{background:#7f1d1d; border:1px solid var(--bad);}
  .explanation{
    margin-top:10px; padding:10px; background:#0f172a; border-radius:8px;
    font-size:.9rem; color:var(--muted); line-height:1.5;
  }
  .tag{display:inline-block; font-size:.75rem; background:#334155; padding:2px 8px; border-radius:4px; margin-left:6px; color:var(--muted);}
  .summary-stats{display:flex; justify-content:center; gap:20px; margin:16px 0; flex-wrap:wrap;}
  .stat{background:#0f172a; padding:12px 20px; border-radius:8px; text-align:center;}
  .stat .num{font-size:1.5rem; font-weight:bold;}
  .stat.good .num{color:var(--good);}
  .stat.bad .num{color:var(--bad);}
  .filter-bar{display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap;}
  .filter-bar button{
    padding:8px 14px; border-radius:20px; border:1px solid #334155; background:#0f172a;
    color:var(--text); cursor:pointer; font-size:.85rem;
  }
  .filter-bar button.active{background:var(--accent); color:#0f172a; border-color:var(--accent);}
</style>
</head>
<body>
<div class="wrap">

  <div id="start-screen">
    <header><h1>📘 전자출판기능사 CBT 모의고사 (2회)</h1></header>
    <div class="card">
      <p>실제 시험과 동일한 형식입니다.</p>
      <ul style="color:var(--muted); line-height:1.7;">
        <li>총 60문항 (사지선다)</li>
        <li>제한시간 60분</li>
        <li>과목: 출판론(1~20), 전자출판(21~40), 전산편집(41~60)</li>
        <li>60문항 중 36문항(60%) 이상 정답 시 합격 (과락 없음)</li>
        <li>종료 후 채점 결과 및 해설 제공</li>
      </ul>
      <button class="btn" onclick="startExam()">시험 시작</button>
    </div>
  </div>

  <div id="exam-screen" class="hidden">
    <header>
      <h1>전자출판기능사 CBT (2회)</h1>
      <div class="timer" id="timer">60:00</div>
    </header>
    <div class="progress"><div class="progress-bar" id="progressBar"></div></div>

    <div class="nav-grid" id="navGrid"></div>

    <div class="card">
      <div class="qnum" id="qnum"></div>
      <div class="qtext" id="qtext"></div>
      <div class="options" id="options"></div>
    </div>

    <div class="controls">
      <button class="btn secondary" onclick="prevQ()">◀ 이전</button>
      <button class="btn secondary" onclick="nextQ()">다음 ▶</button>
    </div>
    <div class="controls">
      <button class="btn submit" onclick="confirmSubmit()">시험 종료 및 채점</button>
    </div>
  </div>

  <div id="result-screen" class="hidden">
    <header><h1>📊 채점 결과</h1></header>
    <div class="card result-summary">
      <div id="passFail"></div>
      <div class="result-score" id="scoreText"></div>
      <div class="summary-stats">
        <div class="stat good"><div class="num" id="correctCount"></div>정답</div>
        <div class="stat bad"><div class="num" id="wrongCount"></div>오답</div>
        <div class="stat"><div class="num" id="unansweredCount"></div>미응답</div>
      </div>
    </div>

    <div class="filter-bar">
      <button class="active" onclick="setFilter('all')">전체 60</button>
      <button onclick="setFilter('wrong')">오답만 보기</button>
      <button onclick="setFilter('correct')">정답만 보기</button>
    </div>

    <div id="reviewList"></div>

    <div class="controls">
      <button class="btn" onclick="location.reload()">다시 풀기</button>
    </div>
  </div>

</div>

<script>
/* ===========================================================
   문제 데이터 (60문항) - 2회차 (1회차와 다른 문항)
   subject: 1=출판론, 2=전자출판, 3=전산편집
   answer: 0-based index
=========================================================== */
const questions = [
// ----- 1과목: 출판론 (1~20) -----
{subject:1, q:"다음 중 출판의 사회적 기능으로 보기 어려운 것은?", options:["지식과 정보의 전달","문화의 보존과 계승","여론 형성","개인의 사적 재산 은닉"], answer:3,
 exp:"출판은 지식·정보 전달, 문화 보존·계승, 여론 형성 등의 사회적 기능을 수행하며, 개인 재산 은닉과는 무관하다."},
{subject:1, q:"다음 중 '저자(著者)'와 '편자(編者)'의 차이를 가장 옳게 설명한 것은?", options:["저자는 원작을 직접 창작한 사람이고, 편자는 여러 자료를 모아 엮은 사람이다","저자와 편자는 완전히 동일한 의미이다","편자는 인쇄소 직원을 의미한다","저자는 출판사 대표를 의미한다"], answer:0,
 exp:"저자는 작품을 직접 창작한 사람이며, 편자는 여러 자료나 글을 수집·정리하여 한 권으로 엮은 사람을 말한다."},
{subject:1, q:"다음 중 출판 기획 시 '경쟁도서 분석'을 하는 가장 주된 목적은?", options:["경쟁사의 영업비밀을 빼내기 위해서","시장의 공백과 차별화 포인트를 찾기 위해서","경쟁사를 비방하기 위해서","인쇄 단가를 낮추기 위해서"], answer:1,
 exp:"경쟁도서 분석은 시장에서 부족한 부분과 자사 도서의 차별화 지점을 찾기 위한 기획 단계의 핵심 작업이다."},
{subject:1, q:"저작권법상 '저작재산권'에 해당하지 않는 것은?", options:["복제권","공연권","성명표시권","전송권"], answer:2,
 exp:"성명표시권은 저작인격권에 속하며, 복제권·공연권·전송권은 저작재산권에 속한다."},
{subject:1, q:"다음 중 '바코드'와 함께 도서에 표기되는 부가기호의 주된 목적은?", options:["도서의 분야, 독자대상, 형태 등의 정보를 코드화하기 위함","저자의 인세를 자동 계산하기 위함","인쇄 색상을 표시하기 위함","서체 종류를 표시하기 위함"], answer:0,
 exp:"부가기호는 도서의 발행형태, 내용분류, 독자대상 등을 코드화하여 ISBN과 함께 표기하는 정보이다."},
{subject:1, q:"다음 중 책의 '본문'에 포함되지 않는 것은?", options:["서문(머리말)","본론(각 장의 내용)","결론(맺음말)","표지의 띠지"], answer:3,
 exp:"띠지는 표지를 장식·홍보하는 부속물로 본문 구성요소에 해당하지 않는다."},
{subject:1, q:"교정 작업에서 '재교'란 무엇을 의미하는가?", options:["최초의 원고 작성","초교 이후 두 번째로 진행하는 교정","인쇄 직전의 최종 점검만을 의미","표지 디자인 확정 단계"], answer:1,
 exp:"재교는 초교에서 지적된 사항을 반영한 뒤 두 번째로 진행하는 교정 단계이다."},
{subject:1, q:"다음 중 '오프셋 인쇄'의 특징으로 옳은 것은?", options:["인쇄판에 잉크를 묻혀 고무 블랭킷을 거쳐 종이에 옮기는 방식","잉크 없이 레이저로만 인쇄하는 방식","3D 프린터 전용 인쇄 방식","음성 데이터를 인쇄하는 방식"], answer:0,
 exp:"오프셋 인쇄는 판면의 잉크를 고무 블랭킷(오프셋 롤러)에 옮긴 후 다시 종이에 인쇄하는 간접 인쇄 방식이다."},
{subject:1, q:"다음 중 출판물의 '정가'를 결정할 때 일반적으로 고려하지 않는 요소는?", options:["제작 원가","예상 판매량","유통 마진","독자의 혈액형"], answer:3,
 exp:"정가 결정에는 제작 원가, 예상 판매량, 유통 마진 등이 고려되며 독자의 혈액형은 무관하다."},
{subject:1, q:"다음 중 '판면'의 의미로 가장 적절한 것은?", options:["인쇄되는 면 전체에서 글자와 그림이 실제로 배치되는 영역","책의 표지 전체","책의 뒷면 광고 영역","책의 보관 창고"], answer:0,
 exp:"판면은 페이지에서 여백을 제외하고 실제로 본문 내용(글자, 그림 등)이 배치되는 영역을 의미한다."},
{subject:1, q:"다음 중 '북디자인'에서 '책등(스파인)'에 일반적으로 표기되는 정보는?", options:["저자명, 서명, 출판사명 등","독자의 이름","인쇄소 직원 명단","유통 계약서 전문"], answer:0,
 exp:"책등(스파인)에는 서가에 꽂혀 있을 때 식별이 가능하도록 서명, 저자명, 출판사명 등을 표기한다."},
{subject:1, q:"다음 중 '전자출판'이 종이출판에 비해 갖는 장점으로 보기 어려운 것은?", options:["대량 인쇄 없이도 즉시 배포 가능","검색 및 멀티미디어 기능 활용 가능","손으로 만지는 질감을 그대로 재현 가능","개정·수정이 비교적 용이"], answer:2,
 exp:"종이 질감과 같은 물리적 감촉은 전자출판이 재현하기 어려운 영역이며, 나머지는 전자출판의 일반적 장점이다."},
{subject:1, q:"다음 중 출판물 유통 경로로 보기 어려운 것은?", options:["오프라인 서점","온라인 서점","전자책 플랫폼","저자의 자택 창고 보관"], answer:3,
 exp:"단순히 저자의 자택에 보관하는 것은 유통 경로가 아니며, 서점·온라인서점·전자책 플랫폼 등이 유통 경로에 해당한다."},
{subject:1, q:"다음 중 '판형'을 결정할 때 고려해야 할 요소로 가장 거리가 먼 것은?", options:["책의 용도(휴대성, 보관성 등)","독자층의 특성","제작 비용","저자의 혈액형 및 생년월일"], answer:3,
 exp:"판형 결정에는 책의 용도, 독자층, 제작 비용 등이 고려되며 저자의 개인적 신상정보는 무관하다."},
{subject:1, q:"다음 중 '증보판'의 의미로 옳은 것은?", options:["기존 내용에 새로운 내용을 추가하여 발행한 판","기존 인쇄판을 그대로 재인쇄한 것","오탈자만 수정한 재인쇄","책의 크기만 줄인 축소판"], answer:0,
 exp:"증보판은 기존 내용에 새로운 내용을 추가하여 다시 출간한 판을 의미한다."},
{subject:1, q:"다음 중 출판사의 '편집부'에서 일반적으로 수행하지 않는 업무는?", options:["원고 검토 및 교정·교열","책의 구성 및 레이아웃 기획","인쇄용지 생산(제지) 직접 수행","저자와의 커뮤니케이션"], answer:2,
 exp:"인쇄용지 생산(제지)은 별도의 제지업체에서 수행하는 업무로 출판사 편집부의 일반적 업무 범위가 아니다."},
{subject:1, q:"다음 중 '오탈자'를 바로잡는 작업과 가장 밀접하게 관련된 용어는?", options:["교정(校正)","마케팅(Marketing)","제본(製本)","유통(流通)"], answer:0,
 exp:"교정은 원고나 인쇄물에서 오탈자, 부호 오류 등을 바로잡는 작업을 의미한다."},
{subject:1, q:"다음 중 출판사가 저작권자에게 일정 비율로 지급하는 대가를 의미하는 용어는?", options:["인세","정가","원가","마진율"], answer:0,
 exp:"인세는 출판물의 판매량 또는 발행 부수에 따라 저작권자에게 지급하는 대가를 의미한다."},
{subject:1, q:"다음 중 '전자출판물'의 유통 단계에서 일반적으로 발생하지 않는 것은?", options:["DRM 적용","온라인 플랫폼 등록","물리적 창고 보관 비용 발생","파일 포맷 변환"], answer:2,
 exp:"전자출판물은 물리적 실체가 없으므로 종이책과 같은 창고 보관 비용이 발생하지 않는다."},
{subject:1, q:"다음 중 출판 계약서에 일반적으로 포함되는 항목이 아닌 것은?", options:["저작권 사용 범위 및 기간","인세율 및 지급 조건","출판 부수 및 형태","저자의 가족관계증명서 전문"], answer:3,
 exp:"출판 계약서에는 저작권 이용 범위, 인세율, 출판 형태 등이 포함되며 가족관계증명서와 같은 개인정보는 해당되지 않는다."},

// ----- 2과목: 전자출판 (21~40) -----
{subject:2, q:"다음 중 비트맵 이미지의 특징으로 옳은 것은?", options:["픽셀로 구성되어 확대 시 화질이 저하될 수 있다","수학적 좌표로 구성되어 무한 확대가 가능하다","파일 용량이 항상 벡터보다 작다","인쇄에는 전혀 사용할 수 없다"], answer:0,
 exp:"비트맵 이미지는 픽셀(점)로 구성되어 있어 원본보다 크게 확대하면 화질이 저하될 수 있다."},
{subject:2, q:"다음 중 인쇄용 이미지의 권장 해상도로 가장 적절한 것은?", options:["72dpi","150dpi","300dpi 이상","30dpi"], answer:2,
 exp:"인쇄용 이미지는 일반적으로 300dpi 이상의 해상도를 권장한다."},

{subject:3, q:"다음 중 '스타일 가이드(디자인 가이드라인)'를 활용하는 주된 이유는?", options:["여러 페이지 또는 여러 작업자 간에 일관된 디자인 톤을 유지하기 위함","파일 용량을 항상 줄이기 위함","인쇄 매수를 늘리기 위함","저작권을 자동으로 등록하기 위함"], answer:0,

/* ===========================================================
   상태 변수
=========================================================== */
let userAnswers = new Array(questions.length).fill(null);
let currentIndex = 0;
let timeLeft = 60 * 60; // 60분
let timerInterval = null;
let currentFilter = 'all';

const PASS_SCORE = 36; // 36/60 이상 합격

/* ===========================================================
   시작
=========================================================== */
function startExam(){
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('exam-screen').classList.remove('hidden');
  buildNavGrid();
  renderQuestion();
  startTimer();
}

function startTimer(){
  updateTimerDisplay();
  timerInterval = setInterval(()=>{
    timeLeft--;
    updateTimerDisplay();
    if(timeLeft <= 0){
      clearInterval(timerInterval);
      alert('시험 시간이 종료되었습니다. 자동으로 채점합니다.');
      submitExam();
    }
  }, 1000);
}

function updateTimerDisplay(){
  const m = Math.floor(timeLeft/60);
  const s = timeLeft % 60;
  document.getElementById('timer').textContent =
    `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

/* ===========================================================
   네비게이션 그리드
=========================================================== */
function buildNavGrid(){
  const grid = document.getElementById('navGrid');
  grid.innerHTML = '';
  questions.forEach((_, i)=>{
    const btn = document.createElement('button');
    btn.textContent = i+1;
    btn.id = 'nav-' + i;
    btn.onclick = ()=>{ currentIndex = i; renderQuestion(); };
    grid.appendChild(btn);
  });
}

function refreshNavGrid(){
  questions.forEach((_, i)=>{
    const btn = document.getElementById('nav-'+i);
    btn.classList.toggle('answered', userAnswers[i] !== null);
    btn.classList.toggle('current', i === currentIndex);
  });
}

/* ===========================================================
   문항 렌더링
=========================================================== */
function renderQuestion(){
  const q = questions[currentIndex];
  document.getElementById('qnum').textContent =
    `문제 ${currentIndex+1} / ${questions.length}  (${subjectName(q.subject)})`;
  document.getElementById('qtext').textContent = q.q;

  const optDiv = document.getElementById('options');
  optDiv.innerHTML = '';
  q.options.forEach((opt, idx)=>{
    const label = document.createElement('label');
    label.innerHTML = `<input type="radio" name="opt" value="${idx}"> ${idx+1}. ${opt}`;
    if(userAnswers[currentIndex] === idx) label.classList.add('selected');
    label.querySelector('input').checked = (userAnswers[currentIndex] === idx);
    label.onclick = ()=>{
      userAnswers[currentIndex] = idx;
      renderQuestion();
      refreshNavGrid();
    };
    optDiv.appendChild(label);
  });

  const progress = ((currentIndex+1)/questions.length)*100;
  document.getElementById('progressBar').style.width = progress + '%';
  refreshNavGrid();

  document.querySelectorAll('.controls')[0].children[0].disabled = (currentIndex===0);
  document.querySelectorAll('.controls')[0].children[1].textContent =
    (currentIndex === questions.length-1) ? '처음으로' : '다음 ▶';
}

function prevQ(){
  if(currentIndex > 0){ currentIndex--; renderQuestion(); window.scrollTo(0,0); }
}
function nextQ(){
  if(currentIndex < questions.length-1){ currentIndex++; }
  else { currentIndex = 0; }
  renderQuestion();
  window.scrollTo(0,0);
}

function subjectName(s){
  return {1:'출판론', 2:'전자출판', 3:'전산편집'}[s];
}

/* ===========================================================
   제출 / 채점
=========================================================== */
function confirmSubmit(){
  const unanswered = userAnswers.filter(a=>a===null).length;
  let msg = '시험을 종료하고 채점하시겠습니까?';
  if(unanswered > 0) msg += `\n(미응답 ${unanswered}문항 있음)`;
  if(confirm(msg)) submitExam();
}

function submitExam(){
  clearInterval(timerInterval);
  document.getElementById('exam-screen').classList.add('hidden');
  document.getElementById('result-screen').classList.remove('hidden');

  let correct = 0, wrong = 0, unanswered = 0;
  questions.forEach((q,i)=>{
    if(userAnswers[i] === null) unanswered++;
    else if(userAnswers[i] === q.answer) correct++;
    else wrong++;
  });

  const passed = correct >= PASS_SCORE;
  document.getElementById('passFail').innerHTML =
    `<span style="font-size:1.3rem; font-weight:bold; color:${passed?'var(--good)':'var(--bad)'}">
       ${passed ? '✅ 합격 (PASS)' : '❌ 불합격 (FAIL)'}
     </span>`;
  document.getElementById('scoreText').textContent = `${correct} / ${questions.length}`;
  document.getElementById('correctCount').textContent = correct;
  document.getElementById('wrongCount').textContent = wrong;
  document.getElementById('unansweredCount').textContent = unanswered;

  renderReview();
}

/* ===========================================================
   리뷰(해설)
=========================================================== */
function setFilter(f){
  currentFilter = f;
  document.querySelectorAll('.filter-bar button').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.filter-bar button[onclick="setFilter('${f}')"]`).classList.add('active');
  renderReview();
}

function renderReview(){
  const list = document.getElementById('reviewList');
  list.innerHTML = '';

  questions.forEach((q,i)=>{
    const userAns = userAnswers[i];
    const isCorrect = userAns === q.answer;

    if(currentFilter === 'wrong' && isCorrect) return;
    if(currentFilter === 'correct' && !isCorrect) return;

    const card = document.createElement('div');
    card.className = 'card review-card ' + (isCorrect ? 'correct' : '');

    let html = `<div class="qnum">문제 ${i+1} <span class="tag">${subjectName(q.subject)}</span>
                 ${userAns===null ? '<span class="tag">미응답</span>' : ''}</div>`;
    html += `<div class="qtext">${q.q}</div>`;

    q.options.forEach((opt, idx)=>{
      let cls = 'review-opt';
      if(idx === q.answer) cls += ' correct-answer';
      else if(idx === userAns) cls += ' wrong-selected';
      html += `<div class="${cls}">${idx+1}. ${opt}
                ${idx===q.answer ? ' ✅ 정답' : (idx===userAns ? ' ❌ 선택한 답' : '')}</div>`;
    });

    html += `<div class="explanation">💡 <b>해설:</b> ${q.exp}</div>`;
    card.innerHTML = html;
    list.appendChild(card);
  });

  if(list.innerHTML === ''){
    list.innerHTML = '<div class="card" style="text-align:center; color:var(--muted);">해당 조건의 문항이 없습니다.</div>';
  }
}
</script>
</body>
</html>
